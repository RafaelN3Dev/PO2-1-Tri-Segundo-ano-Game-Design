<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atari Survival - Arena</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="menu-overlay">
            <h1>ATARI SURVIVAL</h1>
            <div id="features-list">
                <p>Mecânicas Planejadas:</p>
                <ul>
                    <li>1. Movimentação 8 Direções</li>
                    <li>2. Sistema de Recuo (Knockback)</li>
                    <li>3. Projétil com Cooldown</li>
                    <li>4. Balas que Ricocheteiam</li>
                    <li>5. Áreas de Lentidão</li>
                    <li>6. Dash de Esquiva (Shift)</li>
                    <li>7. Power-ups de Expansão</li>
                </ul>
            </div>
            <button id="start-button">START GAME</button>
        </div>
        <div id="ui" style="display: none;">
            <div id="score">SCORE: 0000</div>
            <div id="ammo">AMMO: 10/10</div>
            <div id="lives">LIVES: ❤️❤️❤️</div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
